<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Karaoke — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #0f1117; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }

    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 60px; }

    .header { text-align: center; margin-bottom: 8px; }
    .header .icon { font-size: 2.6rem; margin-bottom: 10px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .header p  { color: #6b7280; font-size: .85rem; margin-top: 6px; }

    .summary { font-size: .8rem; color: #9ca3af; margin: 18px 0 20px; }
    .summary b { color: #a78bfa; }

    .venue-list { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 10px; }

    .venue-card {
      background: #1f2937; border-radius: 14px; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      border: 1.5px solid transparent;
    }

    .venue-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .venue-dot  { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex-shrink: 0; box-shadow: 0 0 8px #22c55e88; }
    .venue-name { font-size: .95rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .venue-id   { font-size: .72rem; color: #6b7280; font-family: monospace; margin-top: 2px; }

    .venue-meta { text-align: right; flex-shrink: 0; }
    .venue-uptime { font-size: .75rem; color: #9ca3af; white-space: nowrap; }
    .venue-badges { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }
    .badge { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 3px 8px; border-radius: 20px; }
    .badge-on  { background: #16341f; color: #4ade80; }
    .badge-off { background: #2a2f3a; color: #6b7280; }

    .empty { text-align: center; color: #4b5563; padding: 40px 0; }
    .empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: .9rem; line-height: 1.6; }

    .loading { text-align: center; color: #4b5563; padding: 30px; font-size: .9rem; }

    .refresh-hint { margin-top: 24px; font-size: .75rem; color: #374151; text-align: center; }
    .no-auth-note {
      margin-top: 10px; font-size: .72rem; color: #6b7280; text-align: center;
      max-width: 400px; line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="icon">🎛️</div>
    <h1>Venue Status</h1>
    <p>Live view of connected venues</p>
  </div>

  <div class="summary" id="summary">Loading…</div>

  <div class="venue-list" id="venue-list">
    <div class="loading">Loading venues…</div>
  </div>

  <div class="refresh-hint" id="refresh-hint"></div>
  <div class="no-auth-note">This page has no login yet — anyone with this link can view it. Fine for now, worth locking down before sharing widely.</div>
</div>

<script>
  function fmtUptime(connectedAt) {
    const ms = Date.now() - new Date(connectedAt).getTime();
    const totalMin = Math.max(0, Math.floor(ms / 60000));
    const h = Math.floor(totalMin / 60), m = totalMin % 60;
    return h > 0 ? `Online ${h}h ${m}m` : `Online ${m}m`;
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadVenues() {
    try {
      const r = await fetch('/admin/venues');
      const venues = await r.json();
      renderVenues(venues);
      document.getElementById('summary').innerHTML = venues.length
        ? `<b>${venues.length}</b> venue${venues.length === 1 ? '' : 's'} online`
        : 'No venues online';
      document.getElementById('refresh-hint').textContent =
        'Refreshes every 5 seconds · ' + new Date().toLocaleTimeString();
    } catch {
      document.getElementById('venue-list').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div><p>Could not load venue status.<br>Check your connection.</p></div>';
      document.getElementById('summary').textContent = '';
    }
  }

  function renderVenues(list) {
    const el = document.getElementById('venue-list');
    if (list.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📡</div><p>No venues online right now.</p></div>';
      return;
    }
    el.innerHTML = list.map(v => {
      const src = v.sourcesEnabled || { local: true, youtube: true };
      return `
        <div class="venue-card">
          <div class="venue-main">
            <span class="venue-dot"></span>
            <div style="min-width:0">
              <div class="venue-name">${escHtml(v.name)}</div>
              <div class="venue-id">${escHtml(v.id)}</div>
            </div>
          </div>
          <div class="venue-meta">
            <div class="venue-uptime">${fmtUptime(v.connectedAt)}</div>
            <div class="venue-badges">
              <span class="badge ${src.local ? 'badge-on' : 'badge-off'}">Local</span>
              <span class="badge ${src.youtube ? 'badge-on' : 'badge-off'}">YouTube</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  loadVenues();
  setInterval(loadVenues, 5000);
</script>
</body>
</html>
