<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karaoke Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
    #kd-root { position: absolute; inset: 0; }

    /* Connection status is host-specific (this page's own WebSocket), not
       part of what KaraokeDisplay renders -- it's a simple overlay on top. */
    #no-signal {
      position: absolute; inset: 0; z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      color: #374151; gap: 12px; background: #000;
    }
    #no-signal .dot { font-size: 2rem; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  </style>
</head>
<body>

<div id="kd-root"></div>

<div id="no-signal">
  <div class="dot">📡</div>
  <p style="color:#4b5563;font-size:1rem">Connecting…</p>
</div>

<script src="/js/karaoke-display.js"></script>
<script src="/js/cdg-player.js"></script>

<script>
KaraokeDisplay.mount(document.getElementById('kd-root'));
const canvas   = KaraokeDisplay.els.canvas;
const videoEl  = KaraokeDisplay.els.video;
const noSignal = document.getElementById('no-signal');

let cdgPlayer = null;
let _position = 0, _elapsed = 0, _playing = false;
let _cntTimer = null;
let _infoTimer = null;

// One-way network latency estimate (seconds), applied to any position value
// we receive over the WebSocket. Unlike the Electron popout (which gets the
// same broadcasts via same-machine IPC, effectively instant), this client is
// a real network hop away -- often WiFi -- so by the time a "position"
// message arrives, the true position has already moved on. Left uncompensated,
// this reads as the wireless screen being permanently behind the audio.
let _latencyComp = 0;
let _pingTimer = null;
function _sendPing() {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping', t: performance.now() }));
}

// Screen Wake Lock: without this, a backgrounded/asleep tab or display can
// have its rAF/timers throttled by the OS (macOS Safari/Chrome do this more
// aggressively than Windows), which stalls the CDG follower loop entirely
// until the screen wakes up again -- visible as a sudden catch-up jump.
let _wakeLock = null;
async function _requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    }
  } catch {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') _requestWakeLock();
});
// Some browsers only grant the lock after a user gesture -- if the initial
// no-gesture request is refused, a first click/tap retries it.
document.addEventListener('click', () => _requestWakeLock(), { once: true });
_requestWakeLock();

function getPos() {
  if (!_playing) return _position;
  return _position + (performance.now() - _elapsed) / 1000;
}

// ── Single reactive state, applied via KaraokeDisplay ────────────────────────
// Fully declarative: every field below reflects what's currently true, and
// _apply() re-derives the whole screen from it each time -- there is no
// partial-patch mode (see karaoke-display.js's own contract comment).
const _state = {
  screen: 'idle',
  appearance: { banner: {}, qr: {}, nextUp: {} },
  idle: {}, karaoke: {}, ad: {}, thankyou: {}, betweensongs: {},
  playbackBanner: { visible: false },
};
function _apply() { KaraokeDisplay.applyState(_state); }
function _setAppearanceFromMsg(msg) {
  if (msg.bannerScale != null) _state.appearance.banner = { scale: msg.bannerScale, color: msg.bannerColor, bgColor: msg.bannerBgColor };
  if (msg.qrX != null) _state.appearance.qr = { x: msg.qrX, y: msg.qrY, size: msg.qrSize, both: msg.qrBoth };
  if (msg.nextUpScale != null) _state.appearance.nextUp = { scale: msg.nextUpScale };
}

// ── WebSocket connection ──────────────────────────────────────────────────────
let ws = null;
function connect() {
  noSignal.style.display = 'flex';

  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    noSignal.style.display = 'none';
    if (_pingTimer) clearInterval(_pingTimer);
    _sendPing();
    _pingTimer = setInterval(_sendPing, 5000);
  };

  ws.onmessage = e => {
    try { handleMsg(JSON.parse(e.data)); } catch {}
  };

  ws.onclose = () => {
    if (_pingTimer) { clearInterval(_pingTimer); _pingTimer = null; }
    noSignal.style.display = 'flex';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}
connect();

// ── Message handler ───────────────────────────────────────────────────────────
function handleMsg(msg) {
  switch (msg.type) {

    case 'song_info': {
      _state.screen = 'karaoke';
      _state.karaoke.songInfo = { title: msg.title, artist: msg.artist, singer: msg.singer_name };
      clearTimeout(_infoTimer);
      _infoTimer = setTimeout(() => { _state.karaoke.songInfo = null; _apply(); }, 8000);
      _apply();
      break;
    }

    case 'cdg_path': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      _state.screen = 'karaoke';
      _state.karaoke.mediaType = 'cdg';
      _apply();
      _position = (msg.pos || 0) + _latencyComp;
      _elapsed  = performance.now();
      _playing  = true;
      fetch(msg.path)
        .then(r => r.arrayBuffer())
        .then(buf => {
          cdgPlayer = new CdgPlayer(canvas);
          cdgPlayer.loadFromBuffer(buf);
          cdgPlayer.startFollower(getPos);
          if (_position > 0) cdgPlayer.seekTo(_position);
        })
        .catch(err => console.error('CDG load error:', err));
      break;
    }

    case 'video_path': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      _state.screen = 'karaoke';
      _state.karaoke.mediaType = 'video';
      _apply();
      videoEl.src = msg.path; // served from /media?p=...
      videoEl.currentTime = (msg.pos || 0) + _latencyComp;
      videoEl.play().catch(() => {});
      _playing = true;
      break;
    }

    case 'video_url': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      _state.screen = 'karaoke';
      _state.karaoke.mediaType = 'video';
      _apply();
      videoEl.src = msg.url;
      if (msg.pos) videoEl.currentTime = msg.pos + _latencyComp;
      videoEl.play().catch(() => {});
      _playing = true;
      break;
    }

    case 'position': {
      const prevPos  = getPos();
      const compPos  = msg.pos + _latencyComp;
      _position = compPos;
      _elapsed  = performance.now();
      _playing  = msg.playing;
      if (cdgPlayer) {
        const drift = Math.abs(prevPos - compPos);
        if (msg.seek || drift > 1.5) cdgPlayer.seekTo(compPos);
      }
      if (videoEl.src && !videoEl.paused && Math.abs(videoEl.currentTime - compPos) > 0.8) {
        videoEl.currentTime = compPos;
      }
      break;
    }

    case 'pong': {
      const rtt    = performance.now() - msg.t;
      const oneWay = Math.max(0, rtt / 2) / 1000;
      _latencyComp = _latencyComp === 0 ? oneWay : (_latencyComp * 0.7 + oneWay * 0.3);
      break;
    }

    case 'pause': {
      _playing = false;
      if (cdgPlayer) cdgPlayer.pause();
      videoEl.pause();
      break;
    }

    case 'resume': {
      _playing = true;
      if (msg.pos != null) _position = msg.pos + _latencyComp;
      _elapsed = performance.now();
      if (cdgPlayer) cdgPlayer.resume();
      videoEl.play().catch(() => {});
      break;
    }

    case 'tr_phase1': {
      _state.screen = 'thankyou';
      _state.thankyou = {
        showBanner: !!msg.showBanner, bannerText: msg.bannerText, animSec: msg.animSec,
        prevSinger: msg.prevSinger || '', variant: msg.thanksVariant || 0,
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
      };
      _setAppearanceFromMsg(msg);
      _apply();
      _playing = false;
      break;
    }

    case 'tr_phase2': {
      _state.screen = 'betweensongs';
      if (_cntTimer) { clearInterval(_cntTimer); _cntTimer = null; }
      let remaining = msg.bgMs > 0 ? Math.ceil(msg.bgMs / 1000) : null;
      _state.betweensongs = {
        showBanner: msg.showBanner !== false, bannerText: msg.bannerText, animSec: msg.animSec,
        venueSrc: msg.venuePath || null,
        nextSinger: msg.nextSinger || '',
        countdownSec: remaining,
        showNextUp: !!(msg.nextUpList && msg.nextUpList.length), nextUpList: msg.nextUpList || [],
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
      };
      _setAppearanceFromMsg(msg);
      _apply();
      if (remaining != null) {
        _cntTimer = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          KaraokeDisplay.tickCountdown(remaining);
        }, 1000);
      }
      _playing = false;
      break;
    }

    case 'transition_end': {
      if (_cntTimer) { clearInterval(_cntTimer); _cntTimer = null; }
      _state.screen = 'idle';
      _apply();
      break;
    }

    case 'idle_config': {
      _state.idle = {
        showBanner: !!msg.showBanner, bannerText: msg.bannerText, animSec: msg.animSec,
        showText: msg.showText !== false, text: msg.text, textColor: msg.textColor, textSize: msg.textSize,
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
        bgImageSrc: _state.idle.bgImageSrc || null, // set independently by venue_path, preserved here
      };
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'venue_path': {
      _state.idle.bgImageSrc = msg.path || null;
      _apply();
      break;
    }

    case 'karaoke_qr': {
      _state.karaoke.showQr = !!(msg.showQr && msg.qrDataUrl);
      _state.karaoke.qrDataUrl = msg.qrDataUrl;
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'show_ad': {
      _state.screen = 'ad';
      _apply();
      _playing = false;
      break;
    }

    case 'ad_config': {
      _state.ad = {
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
        mediaShowing: msg.mediaShowing, pictureSrc: msg.picturePath || null, videoSrc: msg.videoPath || null,
        showNextUp: false, nextUpList: [], // always empty today -- see index.html
      };
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'banner_bg': {
      // Partial update (live color-picker preview) -- explicitly clears any
      // previously-cached resolved bgColor so the fresh hex/opacity win, see
      // _renderTicker's appearance?.bgColor || _hexToRgba(...) fallback.
      _state.appearance.banner = { ..._state.appearance.banner, bgHex: msg.color, bgOpacity: msg.opacity, bgColor: undefined };
      _apply();
      break;
    }

    case 'playback_banner': {
      _state.playbackBanner = { visible: !!msg.visible, text: msg.text, animSec: msg.animSec };
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'stop': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      videoEl.pause(); videoEl.src = '';
      _state.screen = 'idle';
      _state.playbackBanner = { visible: false };
      _apply();
      _playing = false;
      break;
    }

    case 'setting': {
      if (msg.key === 'audio') videoEl.muted = !msg.value;
      break;
    }

  }
}
</script>
</body>
</html>
