<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karaoke Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    #kd-root { position: absolute; inset: 0; }
  </style>
</head>
<body>

<div id="kd-root"></div>

<script src="js/karaoke-display.js"></script>
<script src="js/cdg-player.js"></script>
<script>
KaraokeDisplay.mount(document.getElementById('kd-root'));
const canvas  = KaraokeDisplay.els.canvas;
const videoEl = KaraokeDisplay.els.video;

let cdgPlayer = null;
let _position = 0, _elapsed = 0, _playing = false;
let _cntTimer = null;

// Blob URLs for media read via Electron's IPC (api.readFile) -- tracked so
// the previous one gets revoked, and so unchanged paths skip a redundant re-read.
let _videoBlobUrl = null;
let _venuePath = null, _venueBlobUrl = null;
let _idleBgPath = null, _idleBgBlobUrl = null;
let _adPicturePath = null, _adPictureBlobUrl = null;
let _adVideoPath = null, _adVideoBlobUrl = null;

function getPos() {
  if (!_playing) return _position;
  return _position + (performance.now() - _elapsed) / 1000;
}

// ── Single reactive state, applied via KaraokeDisplay ────────────────────────
// Fully declarative: every field below reflects what's currently true, and
// _apply() re-derives the whole screen from it each time -- there is no
// partial-patch mode (see karaoke-display.js's own contract comment).
const _state = {
  screen: 'idle',
  appearance: { banner: {}, qr: {}, nextUp: {} },
  idle: {}, karaoke: {}, ad: {}, thankyou: {}, betweensongs: {},
  playbackBanner: { visible: false },
};
function _apply() { KaraokeDisplay.applyState(_state); }
function _setAppearanceFromMsg(msg) {
  if (msg.bannerScale != null) _state.appearance.banner = { scale: msg.bannerScale, color: msg.bannerColor, bgColor: msg.bannerBgColor };
  if (msg.qrX != null) _state.appearance.qr = { x: msg.qrX, y: msg.qrY, size: msg.qrSize, both: msg.qrBoth };
  if (msg.nextUpScale != null) _state.appearance.nextUp = { scale: msg.nextUpScale };
  if (msg.countdownScale != null) _state.appearance.countdown = { scale: msg.countdownScale };
}

// ── IPC broadcast (Electron) ──────────────────────────────────────────────────
api.onBroadcast((msg) => {
  switch (msg.type) {

    case 'idle_config': {
      _state.idle = {
        showBanner: !!msg.showBanner, bannerText: msg.bannerText, animSec: msg.animSec,
        showText: msg.showText !== false, text: msg.text, textColor: msg.textColor, textSize: msg.textSize,
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
        bgImageSrc: _state.idle.bgImageSrc || null, // set independently by venue_path, preserved here
      };
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'song_info': {
      // No on-screen title/artist card at song start -- this message still
      // exists purely to switch the screen to 'karaoke' before the media
      // message (cdg_path/video_path/video_url) arrives right behind it.
      _state.screen = 'karaoke';
      _apply();
      break;
    }

    case 'cdg_path': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      _state.screen = 'karaoke';
      _state.karaoke.mediaType = 'cdg';
      _apply();
      _position = msg.pos || 0;
      _elapsed  = performance.now();
      _playing  = true;
      api.readFile(msg.path).then(bytes => {
        const buf = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
        cdgPlayer = new CdgPlayer(canvas);
        cdgPlayer.loadFromBuffer(buf);
        cdgPlayer.startFollower(getPos);
        if (_position > 0) cdgPlayer.seekTo(_position);
      }).catch(err => console.error('CDG load error:', err));
      break;
    }

    case 'video_path': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      _state.screen = 'karaoke';
      _state.karaoke.mediaType = 'video';
      _apply();
      api.readFile(msg.path).then(bytes => {
        const mime = msg.mime || 'video/mp4';
        const blob = new Blob([bytes], { type: mime });
        if (_videoBlobUrl) URL.revokeObjectURL(_videoBlobUrl);
        _videoBlobUrl = URL.createObjectURL(blob);
        videoEl.src = _videoBlobUrl;
        videoEl.currentTime = msg.pos || 0;
        videoEl.play().catch(() => {});
      });
      _playing = true;
      break;
    }

    case 'video_url': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      _state.screen = 'karaoke';
      _state.karaoke.mediaType = 'video';
      _apply();
      videoEl.src = msg.url;
      if (msg.pos) videoEl.currentTime = msg.pos;
      videoEl.play().catch(() => {});
      _playing = true;
      break;
    }

    case 'position': {
      // Periodic sync from main window (every ~250 ms), same-machine IPC so
      // no latency compensation needed (unlike the wireless/web-player screen).
      _position = msg.pos;
      _elapsed  = performance.now();
      _playing  = msg.playing;
      if (cdgPlayer && msg.seek) cdgPlayer.seekTo(msg.pos);
      break;
    }

    case 'pause': {
      _playing = false;
      if (cdgPlayer) cdgPlayer.pause();
      videoEl.pause();
      break;
    }

    case 'resume': {
      _playing  = true;
      _position = msg.pos || _position;
      _elapsed  = performance.now();
      if (cdgPlayer) cdgPlayer.resume();
      videoEl.play().catch(() => {});
      break;
    }

    case 'tr_phase1': {
      _state.screen = 'thankyou';
      _state.thankyou = {
        showBanner: !!msg.showBanner, bannerText: msg.bannerText, animSec: msg.animSec,
        prevSinger: msg.prevSinger || '', variant: msg.thanksVariant || 0,
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
      };
      _setAppearanceFromMsg(msg);
      _apply();
      _playing = false;
      break;
    }

    case 'tr_phase2': {
      _state.screen = 'betweensongs';
      if (_cntTimer) { clearInterval(_cntTimer); _cntTimer = null; }
      let remaining = msg.bgMs > 0 ? Math.ceil(msg.bgMs / 1000) : null;
      _state.betweensongs = {
        showBanner: !!msg.showBanner, bannerText: msg.bannerText, animSec: msg.animSec,
        venueSrc: _venueBlobUrl && _venuePath === msg.venuePath ? _venueBlobUrl : null,
        nextSinger: msg.nextSinger || '',
        countdownSec: remaining, showCountdown: msg.showCountdown !== false,
        showNextUp: !!(msg.nextUpList && msg.nextUpList.length), nextUpList: msg.nextUpList || [],
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
      };
      _setAppearanceFromMsg(msg);
      if (msg.venuePath && _venuePath !== msg.venuePath) {
        _venuePath = msg.venuePath;
        api.readFile(msg.venuePath).then(bytes => {
          if (_venueBlobUrl) URL.revokeObjectURL(_venueBlobUrl);
          _venueBlobUrl = URL.createObjectURL(new Blob([bytes]));
          _state.betweensongs.venueSrc = _venueBlobUrl;
          _apply();
        }).catch(() => {});
      }
      _apply();
      if (remaining != null) {
        _cntTimer = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          // Keep _state in sync too, not just the DOM -- otherwise the next
          // unrelated _apply() (e.g. the venue-image load above finishing
          // late) re-renders with the original countdownSec and the number
          // visibly jumps back to its starting value mid-countdown.
          _state.betweensongs.countdownSec = remaining;
          KaraokeDisplay.tickCountdown(remaining);
        }, 1000);
      }
      _playing = false;
      break;
    }

    case 'transition_end': {
      if (_cntTimer) { clearInterval(_cntTimer); _cntTimer = null; }
      _state.screen = 'idle';
      _apply();
      break;
    }

    case 'playback_banner': {
      _state.playbackBanner = { visible: !!msg.visible, text: msg.text, animSec: msg.animSec };
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'stop': {
      if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
      videoEl.pause(); videoEl.src = '';
      _state.screen = 'idle';
      _state.playbackBanner = { visible: false };
      _apply();
      _playing = false;
      break;
    }

    case 'karaoke_qr': {
      _state.karaoke.showQr = !!(msg.showQr && msg.qrDataUrl);
      _state.karaoke.qrDataUrl = msg.qrDataUrl;
      _setAppearanceFromMsg(msg);
      _apply();
      break;
    }

    case 'show_ad': {
      _state.screen = 'ad';
      _apply();
      _playing = false;
      break;
    }

    case 'ad_config': {
      _state.ad = {
        showQr: !!(msg.showQr && msg.qrDataUrl), qrDataUrl: msg.qrDataUrl,
        mediaShowing: msg.mediaShowing,
        pictureSrc: _adPicturePath === msg.picturePath ? _adPictureBlobUrl : null,
        videoSrc:   _adVideoPath   === msg.videoPath   ? _adVideoBlobUrl   : null,
        showNextUp: false, nextUpList: [], // always empty today -- see index.html
      };
      _setAppearanceFromMsg(msg);

      if (msg.mediaShowing === 'video' && msg.videoPath && _adVideoPath !== msg.videoPath) {
        _adVideoPath = msg.videoPath;
        api.readFile(msg.videoPath).then(bytes => {
          if (_adVideoBlobUrl) URL.revokeObjectURL(_adVideoBlobUrl);
          _adVideoBlobUrl = URL.createObjectURL(new Blob([bytes]));
          _state.ad.videoSrc = _adVideoBlobUrl;
          _apply();
        }).catch(() => {});
      } else if (msg.picturePath && _adPicturePath !== msg.picturePath) {
        _adPicturePath = msg.picturePath;
        api.readFile(msg.picturePath).then(bytes => {
          if (_adPictureBlobUrl) URL.revokeObjectURL(_adPictureBlobUrl);
          _adPictureBlobUrl = URL.createObjectURL(new Blob([bytes]));
          _state.ad.pictureSrc = _adPictureBlobUrl;
          _apply();
        }).catch(() => {});
      }
      _apply();
      break;
    }

    case 'banner_bg': {
      _state.appearance.banner = { ..._state.appearance.banner, bgHex: msg.color, bgOpacity: msg.opacity, bgColor: undefined };
      _apply();
      break;
    }

    case 'venue_path': {
      // Idle screen's background image -- distinct from tr_phase2's own
      // (separately IPC-loaded) venuePath field above.
      if (msg.path) {
        if (_idleBgPath !== msg.path) {
          _idleBgPath = msg.path;
          api.readFile(msg.path).then(bytes => {
            if (_idleBgBlobUrl) URL.revokeObjectURL(_idleBgBlobUrl);
            _idleBgBlobUrl = URL.createObjectURL(new Blob([bytes]));
            _state.idle.bgImageSrc = _idleBgBlobUrl;
            _apply();
          }).catch(() => { _state.idle.bgImageSrc = null; _apply(); });
        }
      } else {
        _idleBgPath = null;
        _state.idle.bgImageSrc = null;
        _apply();
      }
      break;
    }

    case 'setting': {
      if (msg.key === 'cdg_sync_offset' && typeof msg.value === 'number') {
        cdgSyncOffset = msg.value;
      }
      break;
    }

  }
});

// Request current state from main window on open
setTimeout(() => {
  api.broadcast({ type: 'request_state' });
}, 200);

// Keep follower CDG in sync — resume properly handles paused state
// The cdgPlayer _renderLoop already polls getPos() on every rAF frame,
// so no extra timer needed for CDG. For video we do need periodic sync:
setInterval(() => {
  if (!_playing || !videoEl.src || videoEl.paused) return;
  const expected = getPos();
  const drift = Math.abs(videoEl.currentTime - expected);
  if (drift > 0.5) videoEl.currentTime = expected;
}, 2000);
</script>
</body>
</html>
