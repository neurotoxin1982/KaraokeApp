version: '3.8'

services:

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - output_data:/app/output
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    # Override the default CMD to run the RQ worker instead of Flask
    command: rq worker --url redis://redis:6379 karaoke
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - output_data:/app/output
    depends_on:
      - redis

volumes:
  output_data: