services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: karaoke
      POSTGRES_PASSWORD: karaoke
      POSTGRES_DB: karaoke
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karaoke"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://karaoke:karaoke@db:5432/karaoke
      MUSIC_DIR: /hostfs
    volumes:
      - /:/hostfs:ro
      - pgdata:/var/lib/postgresql/data
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.services.app.loadbalancer.server.port=8000

volumes:
  pgdata:
