version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    command: python app.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_FQDN_WEB=${SERVICE_FQDN_WEB}
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python app.py worker
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - media_data:/app/downloads

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  media_data: