{% extends "base.html" %}
{% block title %}Player{% endblock %}

{% block content %}
<div class="flex flex-col h-full bg-black relative overflow-hidden">

  <!-- CDG Canvas -->
  <canvas id="cdg-canvas" class="hidden absolute inset-0 m-auto" style="image-rendering:pixelated"></canvas>

  <!-- Video -->
  <video id="video-player" class="hidden absolute inset-0 w-full h-full object-contain"></video>

  <!-- Idle -->
  <div id="idle-screen" class="absolute inset-0 flex items-center justify-center text-center">
    <div>
      <i class="fa-solid fa-microphone text-gray-800 text-9xl mb-4 block"></i>
      <p class="text-gray-700 text-xl">Waiting for playback…</p>
      <p class="text-gray-800 text-sm mt-2">Start a song on the main screen</p>
    </div>
  </div>

  <!-- Song info overlay -->
  <div id="song-overlay" class="hidden absolute bottom-0 left-0 right-0">
    <div class="bg-gradient-to-t from-black/90 to-transparent px-8 py-6">
      <div id="overlay-singer" class="text-brand-light text-xl font-bold mb-1"></div>
      <div id="overlay-title"  class="text-white text-3xl font-bold truncate"></div>
      <div id="overlay-artist" class="text-gray-300 text-lg truncate"></div>
    </div>
  </div>

  <!-- Tap overlay (folder access for video) -->
  <div id="tap-overlay" class="hidden absolute inset-0 flex items-center justify-center bg-black/80 z-20 cursor-pointer"
       onclick="grantAccess()">
    <div class="text-center">
      <i class="fa-solid fa-folder-open text-yellow-400 text-6xl mb-4 block"></i>
      <p class="text-white text-xl font-bold">Tap to grant folder access</p>
      <p class="text-gray-400 text-sm mt-1">Required for video playback</p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/local-fs.js"></script>
<script src="/static/js/cdg-player.js"></script>
<script>
  let cdgPlayer   = null;
  let _currentFile = null;
  let _recvPos     = 0;
  let _recvWall    = 0;
  let _videoEl     = document.getElementById('video-player');
  let _videoSrc    = null;

  // Interpolated position (for smooth CDG between BC messages)
  function getFollowerPos() {
    return _recvPos + (performance.now() - _recvWall) / 1000;
  }

  // ── BroadcastChannel ────────────────────────────────────────────────────────
  let _bc = null;
  try { _bc = new BroadcastChannel('karaoke'); } catch(_) {}

  if (_bc) {
    _bc.onmessage = async (e) => {
      const d = e.data;

      if (d.type === 'cdg_data') {
        // New CDG data received — start follower renderer
        const canvas = document.getElementById('cdg-canvas');
        document.getElementById('idle-screen').classList.add('hidden');
        document.getElementById('video-player').classList.add('hidden');
        document.getElementById('video-player').src = '';
        canvas.classList.remove('hidden');
        document.getElementById('song-overlay').classList.remove('hidden');

        if (cdgPlayer) cdgPlayer.stop();
        cdgPlayer = new CdgPlayer(canvas);
        cdgPlayer.loadFromBuffer(d.data);
        cdgPlayer.startFollower(getFollowerPos);
        scaleCanvas(canvas);
      }

      if (d.type === 'song_info') {
        document.getElementById('overlay-title').textContent  = d.title  || '';
        document.getElementById('overlay-artist').textContent = d.artist || '';
        document.getElementById('overlay-singer').textContent = d.singer_name ? `♪ ${d.singer_name}` : '';
        _currentFile = d.file_path || null;
      }

      if (d.type === 'position') {
        // Update interpolation anchor
        const newPos = d.pos;
        _recvPos  = newPos;
        _recvWall = performance.now();

        // If CDG is significantly out of sync, jump to correct position
        if (cdgPlayer && cdgPlayer._data) {
          const cdgPos = cdgPlayer._pktIdx / CDG_PACKETS_PER_SEC;
          if (Math.abs(newPos - cdgPos) > 1.0) {
            cdgPlayer.seekTo(newPos);
          }
        }

        // Sync video position if needed
        if (_videoEl.src && !_videoEl.paused) {
          if (Math.abs(_videoEl.currentTime - newPos) > 0.5) {
            _videoEl.currentTime = newPos;
          }
        }
      }

      if (d.type === 'stop') {
        if (cdgPlayer) { cdgPlayer.stop(); cdgPlayer = null; }
        if (_videoEl.src) { _videoEl.pause(); _videoEl.src = ''; }
        document.getElementById('cdg-canvas').classList.add('hidden');
        document.getElementById('video-player').classList.add('hidden');
        document.getElementById('song-overlay').classList.add('hidden');
        document.getElementById('idle-screen').classList.remove('hidden');
      }
    };

    // Tell main page we just opened — request current state
    _bc.postMessage({ type: 'request_state' });
  }

  // ── Video (loaded from local FS if folder is accessible) ────────────────────
  async function tryLoadVideo(filePath) {
    const h = await localFsRestore();
    if (!h) { document.getElementById('tap-overlay').classList.remove('hidden'); return; }
    const src = await localFsBlobUrl(filePath);
    if (!src) return;
    _videoSrc = src;
    _videoEl.src = src;
    _videoEl.classList.remove('hidden');
    document.getElementById('cdg-canvas').classList.add('hidden');
    document.getElementById('idle-screen').classList.add('hidden');
    document.getElementById('song-overlay').classList.remove('hidden');
    _videoEl.muted = true; // audio plays on main screen
    _videoEl.play().catch(() => {});
  }

  async function grantAccess() {
    const h = await localFsPick();
    if (h) {
      document.getElementById('tap-overlay').classList.add('hidden');
      if (_currentFile) tryLoadVideo(_currentFile);
    }
  }

  // ── Canvas scaling ───────────────────────────────────────────────────────────
  function scaleCanvas(c) {
    const W = window.innerWidth, H = window.innerHeight;
    const scale = Math.min(W / 300, H / 216);
    c.style.width  = `${300 * scale}px`;
    c.style.height = `${216 * scale}px`;
  }
  window.addEventListener('resize', () => {
    const c = document.getElementById('cdg-canvas');
    if (!c.classList.contains('hidden')) scaleCanvas(c);
  });
</script>
{% endblock %}
